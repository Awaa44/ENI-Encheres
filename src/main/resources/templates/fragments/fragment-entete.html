<header class="container" th:fragment="frag-entete" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <nav class="navbar navbar-expand-lg navbar-light bg-light justify-content-between">
            <a th:href="@{/accueil}">ENI-Enchères</a>


        <!--liens navbar utilisateur déconnecté-->
        <ul class="navbar-nav ">
            <!-- Visible seulement si NON connecté -->
            <li class="nav-item" sec:authorize="!isAuthenticated()">
                <a class="nav-link active" th:href="@{/inscription}">S'inscrire</a>
            </li>

            <li class="nav-item" sec:authorize="!isAuthenticated()">
                <a class="nav-link active" th:href="@{/login}">Se connecter</a>
            </li>
        </ul>


        <!--liens navbar utilisateur connecté-->
        <ul class="navbar-nav ">
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <span class="nav-link active">Bonjour <strong sec:authentication="name">Utilisateur</strong></span>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <a class="nav-link active" th:href="@{/accueil}">Enchères</a>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <a class="nav-link active" th:href="@{/nouvelle_vente}">Vendre un article</a>
            </li>

            <li class="nav-item" sec:authorize="isAuthenticated()">
                <a class="nav-link active" th:href="@{/profil}">Mon profil</a>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="nav-link active" type="submit" style="background: none; border: none; color: inherit;
                     cursor: pointer; text-decoration: underline;">Se déconnecter
                    </button>
                </form>
            </li>
        </ul>
    </nav>
</header>
