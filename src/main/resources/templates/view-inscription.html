<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Enchères - Inscription</title>
</head>
<body>
<!--Navbar-->
<header th:replace="~{/fragments/fragment-entete :: frag-entete}">
</header>
<main class="container">
    <h3 class="text-center mb-5 mt-5">Inscription - Mon Profil</h3>

    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">

            <!--Message succes à l'utilisateur-->
            <div th:if="${succesSuppressionCompte}" style="color: green; background: #d4edda; padding: 10px; margin: 10px 0;">
                <span th:text="${succesSuppressionCompte}"></span>
            </div>

            <!-- Card du formulaire -->
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form action="/inscription" method="post" th:object="${inscriptionDto}">

                        <!--Token CSRF-->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <!-- Section Informations personnelles -->
                        <div class="mb-3">
                            <label for="inputPseudo" class="form-label">Pseudo <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{pseudo}" class="form-control" id="inputPseudo" required>
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('pseudo')}"
                                 th:each="erreur: ${#fields.errors('pseudo')}" th:text="${erreur}">
                            </div>
                        </div>


                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="inputNom" class="form-label">Nom <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{nom}" class="form-control" id="inputNom" required>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('nom')}"
                                     th:each="erreur: ${#fields.errors('nom')}" th:text="${erreur}">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="inputPrenom" class="form-label">Prénom <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{prenom}" class="form-control" id="inputPrenom" required>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('prenom')}"
                                     th:each="erreur: ${#fields.errors('prenom')}" th:text="${erreur}">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="inputEmail" class="form-label">Email <span class="text-danger">*</span></label>
                                <input type="email" th:field="*{email}" class="form-control" id="inputEmail" placeholder="exemple@email.com" required>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('email')}"
                                     th:each="erreur: ${#fields.errors('email')}" th:text="${erreur}">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="inputTelephone" class="form-label">Téléphone</label>
                                <input type="tel" th:field="*{telephone}" class="form-control" id="inputTelephone" placeholder="06 12 34 56 78">
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('telephone')}"
                                     th:each="erreur: ${#fields.errors('telephone')}" th:text="${erreur}">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="inputRue" class="form-label">Rue <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{rue}" class="form-control" id="inputRue" placeholder="Numéro et nom de rue" required>
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('rue')}"
                                 th:each="erreur: ${#fields.errors('rue')}" th:text="${erreur}">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="inputCP" class="form-label">Code Postal <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{codePostal}" class="form-control" id="inputCP" placeholder="35000" required>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('codePostal')}"
                                     th:each="erreur: ${#fields.errors('codePostal')}" th:text="${erreur}">
                                </div>
                            </div>
                            <div class="col-md-8 mb-3">
                                <label for="inputVille" class="form-label">Ville <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{ville}" class="form-control" id="inputVille" placeholder="Rennes" required>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('ville')}"
                                     th:each="erreur: ${#fields.errors('ville')}" th:text="${erreur}">
                                </div>
                            </div>
                        </div>

                        <!--Mot de passe-->
                        <div class="mb-3">
                            <label for="inputMotDePasse" class="form-label">Mot de passe <span class="text-danger">*</span></label>
                            <input type="password" th:field="*{motDePasse}" class="form-control" id="inputMotDePasse" required>
                            <div class="form-text">Minimum 8 caractères, 1 majuscule, 1 nombre, 1 caractère spécial</div>
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('motDePasse')}"
                                 th:each="erreur: ${#fields.errors('motDePasse')}" th:text="${erreur}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="inputconfirmMotDePasse" class="form-label">Confirmation mot de passe <span class="text-danger">*</span></label>
                            <input type="password" th:field="*{confirmMotDePasse}" class="form-control" id="inputconfirmMotDePasse" required>
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('confirmMotDePasse')}"
                                 th:each="erreur: ${#fields.errors('confirmMotDePasse')}" th:text="${erreur}">
                            </div>
                        </div>

                        <!-- Boutons -->
                        <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                            <a th:href="@{/accueil}" class="col-3 btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-circle me-2"></i>Créer mon compte
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Lien retour connexion -->
            <div class="text-center mt-4">
                <p class="text-muted">
                    Vous avez déjà un compte ?
                    <a th:href="@{/login}" class="text-decoration-none fw-bold">Se connecter</a>
                </p>
            </div>

        </div>
    </div>
</main>

<!--pied de page-->
<footer></footer>

</body>
</html>
