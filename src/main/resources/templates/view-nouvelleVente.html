<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Vente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<body>
<header th:replace="~{/fragments/fragment-entete :: frag-entete}">
</header>

<main class="container">
    <div class="row">
        <h4 class="text-center p-3">Nouvelle vente</h4>
        <!--aside image-->
        <aside class="col-3 ">
            <!--TODO th:if image-->
            <img src="" alt="image" class="img-fluid rounded">
        </aside>

        <!--formulaire-->
        <form class="col-6" action="/nouvelle_vente" method="post" th:object="${creerVenteDto}">

            <!--Token CSRF-->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!--nom article-->
            <div class="row mb-1">
                <label for="nomArticle" class="col-4 col-form-label">Article :</label>
                <div class="col-8">
                    <input type="text" th:field="*{nomArticle}" class="form-control" id="nomArticle">
                </div>
                <div class="text-danger"
                     th:if="${#fields.hasErrors('nomArticle')}"
                     th:each="erreur: ${#fields.errors('nomArticle')}" th:text="${erreur}">
                </div>
            </div>

            <!--description-->
            <div class="row mb-1">
                <label for="description" class="col-4 col-form-label">Description :</label>
                <div class="col-8">
                    <textarea type="" th:field="*{description}" class="form-control" id="description"></textarea>
                </div>
                <div class="text-danger"
                     th:if="${#fields.hasErrors('description')}"
                     th:each="erreur: ${#fields.errors('description')}" th:text="${erreur}">
                </div>
            </div>

            <!--categorie-->
            <!--TODO th:each categories du select-->
            <div class="row mb-1">
                <label for="inputCategorie" class="col-4 col-form-label">Catégorie :</label>
                <div class="col-8">
                    <select class="col form-select" id="inputCategorie" th:field="*{noCategorie}">
                        <option value="">--Choisir une catégorie--</option>
                        <option th:each="categorie : ${categories}"
                                th:value="${categorie.noCategorie}"
                                th:text="${categorie.libelle}">
                        </option>
                    </select>
                </div>
                <div class="text-danger"
                     th:if="${#fields.hasErrors('noCategorie')}"
                     th:each="erreur: ${#fields.errors('noCategorie')}" th:text="${erreur}">
                </div>
            </div>

            <!--upload image-->
            <div class="row mb-1">
                <label for="image" class="col-4 col-form-label">Photo de l'article :</label>
                <div class="col-8">
                    <input class="form-control" type="file" id="image" name="image">
                </div>
            </div>

            <!--mise a prix-->
            <div class="row mb-1">
                <label for="miseAPrix" class="col-4 col-form-label">Mise à prix :</label>
                <div class="col-8">
                    <input type="number" th:field="*{miseAPrix}" class="form-control" id="miseAPrix">
                </div>
                <div class="text-danger"
                     th:if="${#fields.hasErrors('miseAPrix')}"
                     th:each="erreur: ${#fields.errors('miseAPrix')}" th:text="${erreur}">
                </div>
            </div>

            <!--date debut-->
            <div class="row mb-1">
                <label for="dateDebut" class="col-4 col-form-label">Début de l'enchère :</label>
                <div class="col-8">
                    <input type="datetime-local" th:field="*{dateDebutEnchere}" class="form-control" id="dateDebut">
                </div>
                <div class="text-danger"
                     th:if="${#fields.hasErrors('dateDebutEnchere')}"
                     th:each="erreur: ${#fields.errors('dateDebutEnchere')}" th:text="${erreur}">
                </div>
            </div>

            <!--date fin-->
            <div class="row mb-1">
                <label for="dateFin" class="col-4 col-form-label">Fin de l'enchère :</label>
                <div class="col-8">
                    <input type="datetime-local" th:field="*{dateFinEnchere}" class="form-control" id="dateFin">
                </div>
                <div class="text-danger"
                     th:if="${#fields.hasErrors('dateFinEnchere')}"
                     th:each="erreur: ${#fields.errors('dateFinEnchere')}" th:text="${erreur}">
                </div>
            </div>

            <!--fieldset adresse-->
            <div class="row mt-3 mb-3 justify-content-center">
                <fieldset class="col-11 border p-2 bg-light rounded border-secondary">
                    <legend class="text-center">Retrait</legend>

                    <!--select adresse enregistrée-->
                    <div class="row-12 mb-3 input-group input-group-sm justify-self-center">
                        <div class="col"></div>
                        <span class="col-auto input-group-text">Adresses :</span>
                        <select class="form-select col-auto" id="adressePrecedentes" th:field="*{idRetraitExistant}">
                            <option value="">Choisir une adresse</option>
                            <option th:each="retrait : ${retraits}"
                                    th:value="${retrait.idRetrait}"
                                    th:data-rue="${retrait.rue}"
                                    th:data-cp="${retrait.codePostal}"
                                    th:data-ville="${retrait.ville}"
                                    th:text="${retrait.rue + ' ' + retrait.codePostal + ' ' + retrait.ville}">
                            </option>
                        </select>
                        <div class="text-danger"
                             th:if="${#fields.hasErrors('idRetraitExistant')}"
                             th:each="erreur: ${#fields.errors('idRetraitExistant')}" th:text="${erreur}">
                        </div>
<!--                        <div class="col"></div>-->
                    </div>
                    <!--rue-->
                    <div class="row mb-1">
                        <label for="rueRetrait" class="col-4 col-form-label">Rue :</label>
                        <div class="col-8">
                            <input type="text" th:field="*{rue}" class="form-control" id="rueRetrait">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('rue')}"
                                 th:each="erreur: ${#fields.errors('rue')}" th:text="${erreur}">
                            </div>
                        </div>
                    </div>
                    <!--cp-->
                    <div class="row mb-1">
                        <label for="cpRetrait" class="col-4 col-form-label">Code postal :</label>
                        <div class="col-8">
                            <input type="text" th:field="*{codePostal}" class="form-control" id="cpRetrait">
                            <div class="text-danger" th:if="${#fields.hasErrors('codePostal')}" th:errors="*{codePostal}"></div>
                        </div>
                    </div>
                    <!--ville-->
                    <div class="row mb-1">
                        <label for="villeRetrait" class="col-4 col-form-label">Ville :</label>
                        <div class="col-8">
                            <input type="text" th:field="*{ville}" class="form-control" id="villeRetrait">
                            <div class="text-danger" th:if="${#fields.hasErrors('ville')}" th:errors="*{ville}"></div>
                        </div>
                    </div>
                </fieldset>
            </div>

            <!--boutons-->
            <div class="row mb-5 justify-content-around">
                <a th:href="@{/accueil}" class="col-3 btn btn-secondary">Annuler</a>

                <button type="submit" class="col-3 btn btn-primary">Enregistrer</button>
            </div>
        </form>
    </div>
</main>
<script th:src="@{/js/adressesSelect.js}"></script>
</body>
</html>
