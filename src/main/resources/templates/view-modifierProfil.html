<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Enchères - Inscription</title>
</head>
<body>
<!--Navbar-->
<header th:replace="~{/fragments/fragment-entete :: frag-entete}">
</header>
<main class="container">
    <h3 class="text-center mb-5 mt-5">Mon Profil - Modification</h3>

    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">

            <!-- Card du formulaire -->
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form action="/modifierProfil" method="post" th:object="${modifierProfilDto}">
                        <!--Token CSRF-->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <!-- Section Informations personnelles -->
                        <div class="mb-3">
                            <label for="inputPseudo" class="form-label">Pseudo </label>
                            <input type="text" class="form-control" th:field="*{pseudo}" id="inputPseudo">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('pseudo')}"
                                 th:each="erreur: ${#fields.errors('pseudo')}" th:text="${erreur}">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="inputNom" class="form-label">Nom </label>
                                <input type="text" class="form-control" th:field="*{nom}" id="inputNom">
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('nom')}"
                                     th:each="erreur: ${#fields.errors('nom')}" th:text="${erreur}">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="inputPrenom" class="form-label">Prénom </label>
                                <input type="text" class="form-control" th:field="*{prenom}" id="inputPrenom">
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('prenom')}"
                                     th:each="erreur: ${#fields.errors('prenom')}" th:text="${erreur}">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="inputEmail" class="form-label">Email </label>
                                <input type="email" class="form-control" th:field="*{email}" id="inputEmail">
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('email')}"
                                     th:each="erreur: ${#fields.errors('email')}" th:text="${erreur}">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="inputTelephone" class="form-label">Téléphone</label>
                                <input type="tel" class="form-control" th:field="*{telephone}" id="inputTelephone">
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('telephone')}"
                                     th:each="erreur: ${#fields.errors('telephone')}" th:text="${erreur}">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="inputRue" class="form-label">Rue </label>
                            <input type="text" class="form-control" th:field="*{rue}" id="inputRue">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('rue')}"
                                 th:each="erreur: ${#fields.errors('rue')}" th:text="${erreur}">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="inputCP" class="form-label">Code Postal </label>
                                <input type="text" class="form-control" th:field="*{codePostal}" id="inputCP">
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('codePostal')}"
                                     th:each="erreur: ${#fields.errors('codePostal')}" th:text="${erreur}">
                                </div>
                            </div>
                            <div class="col-md-8 mb-3">
                                <label for="inputVille" class="form-label">Ville </label>
                                <input type="text" class="form-control" th:field="*{ville}" id="inputVille">
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('ville')}"
                                     th:each="erreur: ${#fields.errors('ville')}" th:text="${erreur}">
                                </div>
                            </div>
                        </div>

                        <!--Mot de passe-->
                        <div class="mb-3">
                            <label for="inputMotDePasse" class="form-label">Mot de passe actuel </label>
                            <input type="password" class="form-control" th:field="*{motDePasse}" id="inputMotDePasse" required>
                            <div class="form-text">Minimum 8 caractères</div>
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('motDePasse')}"
                                 th:each="erreur: ${#fields.errors('motDePasse')}" th:text="${erreur}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="inputNewMotDePasse" class="form-label">Nouveau mot de passe </span></label>
                            <input type="password" class="form-control" th:field="*{newMotDePasse}" id="inputNewMotDePasse" >
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('newMotDePasse')}"
                                 th:each="erreur: ${#fields.errors('newMotDePasse')}" th:text="${erreur}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="inputConfirmMotDePasse" class="form-label">Confirmation mot de passe </span></label>
                            <input type="password" class="form-control" th:field="*{confirmMotDePasse}" id="inputConfirmMotDePasse" >
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('confirmMotDePasse')}"
                                 th:each="erreur: ${#fields.errors('confirmMotDePasse')}" th:text="${erreur}">
                            </div>
                        </div>

                        <!--Credit affichage non modifiable-->
                        <div class="mb-3">
                            <label for="inputCredit" class="form-label">Credit disponible </span></label>
                            <input type="text" th:value="${utilisateur.credit}" id="inputCredit" class="form-control border-0" disabled>
                        </div>

                        <!-- Boutons -->
                        <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                            <a th:href="@{/profil}" class="col-3 btn btn-secondary">Annuler</a>

                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-circle me-2"></i>Modifier mon compte
                            </button>

                        </div>
                    </form>

                    <div class="d-flex justify-content-end mt-3 pt-3 border-top">
                        <form th:action="@{/supprimerCompte}" method="POST" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-danger"
                                    onclick="return confirm('Êtes-vous sûr de vouloir supprimer votre compte ?')">
                                <i class="bi bi-trash me-2"></i>Supprimer mon compte
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>

<!--pied de page-->
<footer></footer>

</body>
</html>
