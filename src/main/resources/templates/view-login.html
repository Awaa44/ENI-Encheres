<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Enchère - Connexion</title>
</head>
<body>
<header th:replace="~{/fragments/fragment-entete :: frag-entete}">
</header>
<main class="container">
    <h3 class="text-center mb-5 mt-5">Connexion</h3>

    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">

            <!--Message succes à l'utilisateur-->
            <div th:if="${succes}" style="color: green; background: #d4edda; padding: 10px; margin: 10px 0;">
                <span th:text="${succes}"></span>
            </div>

            <!--Message erreur login ou mot de passe-->
            <div th:if="${errorMesage}" style="color: red; background: #edd4d4; padding: 10px; margin: 10px 0;">
                <span th:text="${errorMesage}"></span>
            </div>

            <!--Card du formulaire-->
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form action="/login" method="post">
                        <!--token CSRF-->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <!--Champs login-->
                        <div class="d-flex flex-column align-items-center gap-3">
                            <div class="row align-items-center" style="width: 450px">
                                <div class="col-4 text-start">
                                    <label for="username" class="form-label mb-0">Pseudo :</label>
                                </div>
                                <div class="col-8">
                                    <input type="text" name="username" id="username" class="form-control">
                                </div>
                            </div>
                            <div class="row align-items-center" style="width: 450px">
                                <div class="col-4 text-start">
                                    <label for="password" class="form-label mb-0">Mot de Passe :</label>
                                </div>
                                <div class="col-8">
                                    <input type="password" name="password" id="password" class="form-control">
                                </div>
                            </div>
                        </div>

                        <!--Bouton login + mot de passe oublié + se souvenir de moi-->
                        <div class="d-flex justify-content-center">
                            <div class="row align-items-center mt-4">
                                <div class="col-auto">
                                    <button type="submit">Connexion</button>
                                </div>
                                <div class="col-auto">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" name="seSouvenir" id="inputSeSouvenir">
                                        <label class="form-check-label" for="inputSeSouvenir">Se souvenir de moi</label>
                                    </div>
                                    <a th:href="@{/forgot-password}">Mot de passe oublié</a>
                                </div>
                            </div>
                        </div>

                        <!--Création de compte-->
                        <div class="d-flex justify-content-center mt-4">
                            <a th:href="@{/inscription}" class="btn btn-primary">Création de compte</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<!--pied de page-->
<footer></footer>

</body>
</html>
