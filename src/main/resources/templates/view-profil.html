<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Enchère - Profil</title>
</head>
<body>
<header th:replace="~{/fragments/fragment-entete :: frag-entete}">
</header>
<main class="container">
    <h3 class="text-center mb-5 mt-5">Mon Profil</h3>

    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">

            <!--Message succes modification profil utilisateur-->
            <div th:if="${succes}" style="color: green; background: #d4edda; padding: 10px; margin: 10px 0;">
                <span th:text="${succes}"></span>
            </div>

            <!--Card du formulaire-->
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form action="/profil" method="get" th:object="${utilisateur}">

                        <!--Champs profil-->
                        <div class="d-flex flex-column align-items-center gap-3">
                            <div class="row align-items-center" style="width: 500px">
                                <div class="col-4 text-start">
                                    <label for="username" class="form-label mb-0">Pseudo :</label>
                                </div>
                                <div class="col-8">
                                    <input type="text" th:field="*{pseudo}" id="username" class="form-control border-0" disabled>
                                </div>

                            </div>
                            <div class="row align-items-center" style="width: 500px">
                                <div class="col-4 text-start">
                                    <label for="inputNom" class="form-label mb-0">Nom :</label>
                                </div>
                                <div class="col-8">
                                    <input type="text" th:field="*{nom}" id="inputNom" class="form-control border-0" disabled>
                                </div>
                            </div>
                            <div class="row align-items-center" style="width: 500px">
                                <div class="col-4 text-start">
                                    <label for="inputPrenom" class="form-label mb-0">Prénom :</label>
                                </div>
                                <div class="col-8">
                                    <input type="text" th:field="*{prenom}" id="inputPrenom" class="form-control border-0" disabled>
                                </div>
                            </div>

                            <div class="row align-items-center" style="width: 500px">
                                <div class="col-4 text-start">
                                    <label for="inputEmail" class="form-label mb-0">Email :</label>
                                </div>
                                <div class="col-8">
                                    <input type="text" th:field="*{email}" id="inputEmail" class="form-control border-0" disabled>
                                </div>
                            </div>
                            <div class="row align-items-center" style="width: 500px">
                                <div class="col-4 text-start">
                                    <label for="inputTel" class="form-label mb-0">Téléphone :</label>
                                </div>
                                <div class="col-8">
                                    <input type="text" th:field="*{telephone}" id="inputTel" class="form-control border-0" disabled>
                                </div>
                            </div>
                            <div class="row align-items-center" style="width: 500px">
                                <div class="col-4 text-start">
                                    <label for="inputRue" class="form-label mb-0">Rue :</label>
                                </div>
                                <div class="col-8">
                                    <input type="text" th:field="*{rue}" id="inputRue" class="form-control border-0" disabled>
                                </div>
                            </div>
                            <div class="row align-items-center" style="width: 500px">
                                <div class="col-4 text-start">
                                    <label for="inputCP" class="form-label mb-0">Code Postal :</label>
                                </div>
                                <div class="col-8">
                                    <input type="text" th:field="*{codePostal}" id="inputCP" class="form-control border-0" disabled>
                                </div>
                            </div>
                            <div class="row align-items-center" style="width: 500px">
                                <div class="col-4 text-start">
                                    <label for="inputVille" class="form-label mb-0">Ville :</label>
                                </div>
                                <div class="col-8">
                                    <input type="text" th:field="*{ville}" id="inputVille" class="form-control border-0" disabled>
                                </div>
                            </div>
                            <div class="row align-items-center" style="width: 500px">
                                <div class="col-4 text-start">
                                    <label for="inputCredit" class="form-label mb-0">Credit disponible :</label>
                                </div>
                                <div class="col-8">
                                    <input type="text" th:field="*{credit}" id="inputCredit" class="form-control border-0" disabled>
                                </div>
                            </div>
                        </div>

                        <!--Bouton modifier-->
                        <div class="d-flex justify-content-center mt-4">
                            <a th:href="@{/modifierProfil}" class="btn btn-primary">Modifier profil</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<!--pied de page-->
<footer></footer>

</body>
</html>
