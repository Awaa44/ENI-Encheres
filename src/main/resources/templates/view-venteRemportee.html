<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vente Remportée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/venteRemportee.css}">
</head>
<body>
<header th:replace="~{/fragments/fragment-entete :: frag-entete}">
</header>
<div class="vente-page">

    <h3 class="vente-titre">Vous avez remporté la vente</h3>

    <div class="vente-contenu">

        <!-- Image -->
        <div class="vente-image">
            <img src="/images/article-default.jpg" alt="Image article">
        </div>

        <!-- Infos -->
        <div class="vente-infos">
            <p class="vente-nom" th:text="${venteRemportee.getNomArticle()}"></p>

            <p><strong>Description :</strong></p>
            <p th:text="${venteRemportee.getDescription()}"></p>

            <p><strong>Meilleure offre :</strong>
                <span th:text="${venteRemportee.getPrixVente()}"></span> pts
            </p>

            <p><strong>Mise à prix :</strong>
                <span th:text="${venteRemportee.getMiseAPrix()}"></span> points
            </p>

            <br>

            <p><strong>Retrait :</strong><br>
                <span th:text="${venteRemportee.getLieuRetrait().getAdresseConcat()}"></span>
            </p>

            <br>

            <p><strong>Vendeur :</strong>
                <span th:text="${venteRemportee.getVendeur().getPseudo()}"></span>
            </p>

            <p><strong>Tel :</strong>
                <span th:text="${venteRemportee.getVendeur().getTelephone()}"></span>
            </p>
        </div>
    </div>
    <div class="vente-bouton">
        <a th:href="@{/accueil}" class="btn btn-outline-dark">Retour</a>
    </div>
</div>
</body>
</html>
